<body class="bg-background font-body text-on-surface overflow-hidden">
<main class="flex min-h-screen">
<!-- Left Side: Visual Hero (Asymmetric Bleed) -->
<section class="hidden lg:flex lg:w-1/2 relative overflow-hidden">
<div class="absolute inset-0 z-0">
<img class="h-full w-full object-cover" data-alt="Cinematic wide shot of a vibrant green football pitch in Da Nang at sunrise, lush tropical mountains in the background with soft morning mist and golden light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBMQm9ufuz_agUbhBrOJpQ17iDzXlvJOkIxqH_ztFq59RImD31X6Q0Xn5gVxVi0XfIJnz28cphJk727aSI5BfFRSpMc2DuSKdG0_Mi4EgK2UXy1JdiYXVfVwnF4Qwc_V_0iFnDmf9Za785CFX3KmVj9TGn0npOhgXDIDzVUSRYFDd59_KOrfAG223oHLD8q4ay96XcINRLe82jssG1iESDcfUJ8fyo6ixgwsRl7uVi0dCWpYyrCuzY3wn7a_7LnNMmAwZHhTsq4OXQ"/>
</div>
<!-- Editorial Overlay Content -->
<div class="relative z-10 p-16 flex flex-col justify-between h-full bg-primary/20 backdrop-blur-[2px]">
<div>
<h1 class="text-surface-container-lowest font-black text-6xl tracking-tighter leading-none mb-4">
                        Sportsync
                    </h1>
<p class="text-primary-container font-medium text-xl uppercase tracking-widest">
                        Da Nang Editorial
                    </p>
</div>
<div class="max-w-md">
<h2 class="text-surface-container-lowest font-headline font-extrabold text-5xl leading-[1.1] mb-6">
                        The Kinetic <br/>Pitch Experience.
                    </h2>
<p class="text-surface-container-lowest/90 text-lg leading-relaxed font-light">
                        Kết nối cộng đồng yêu bóng đá tại Đà Nẵng qua những sân chơi tiêu chuẩn chuyên nghiệp. Trải nghiệm tốc độ, đam mê và sự gắn kết.
                    </p>
</div>
<div class="flex gap-4">
<div class="flex items-center gap-2 bg-surface-container-lowest/10 backdrop-blur-md px-4 py-2 rounded-xl text-surface-container-lowest border border-surface-container-lowest/20">
<span class="material-symbols-outlined text-primary-container">stadium</span>
<span class="text-sm font-medium">50+ Sân bóng</span>
</div>
<div class="flex items-center gap-2 bg-surface-container-lowest/10 backdrop-blur-md px-4 py-2 rounded-xl text-surface-container-lowest border border-surface-container-lowest/20">
<span class="material-symbols-outlined text-primary-container">groups</span>
<span class="text-sm font-medium">10k+ Thành viên</span>
</div>
</div>
</div>
</section>
<!-- Right Side: Authentication Shell -->
<section class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-surface-container-lowest">
<div class="w-full max-w-[480px]">
<!-- Brand Mobile Logo -->
<div class="lg:hidden mb-8">
<h1 class="text-primary font-black text-3xl tracking-tighter">Sportsync</h1>
</div>
<!-- Tabs -->
<div class="flex gap-8 mb-10 border-b border-surface-variant/30">
<a class="pb-3 text-lg font-bold active-tab transition-all inline-block" href="{{DATA:SCREEN:SCREEN_9}}">Đăng nhập</a>
<button class="pb-3 text-lg font-medium text-on-surface-variant hover:text-primary transition-all">Tạo tài khoản</button>
</div>
<!-- Role Selection Chips -->
<div class="mb-8">
<label class="block text-label-md uppercase tracking-wider font-bold mb-4 text-on-surface-variant">Tôi là:</label>
<div class="flex gap-3">
<button class="flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-xl border-2 border-primary bg-primary/5 text-primary font-bold transition-all">
<span class="material-symbols-outlined">person</span>

                        </button>
<button class="flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-xl border-2 border-surface-container-high text-on-surface-variant font-medium hover:border-primary/50 transition-all">
<span class="material-symbols-outlined">storefront</span>
                            Chủ sân
                        </button>
</div>
</div>

<div class="grid grid-cols-2 gap-4">
<div class="col-span-2 md:col-span-1">
<label class="block text-sm font-semibold mb-2 text-on-surface-variant">Họ và tên</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 form-input-focus transition-all text-on-surface placeholder:text-outline-variant" placeholder="Nguyễn Văn A" type="text"/>
</div>
<div class="col-span-2 md:col-span-1">
<label class="block text-sm font-semibold mb-2 text-on-surface-variant">Số điện thoại</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 form-input-focus transition-all text-on-surface placeholder:text-outline-variant" placeholder="0905 XXX XXX" type="tel"/>
</div>
</div>
<div>
<label class="block text-sm font-semibold mb-2 text-on-surface-variant">Email</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 form-input-focus transition-all text-on-surface placeholder:text-outline-variant" placeholder="example@sportsync.vn" type="email"/>
</div>
<div class="relative">
<label class="block text-sm font-semibold mb-2 text-on-surface-variant">Mật khẩu</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 form-input-focus transition-all text-on-surface placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-[46px] text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>

<div class="flex items-start gap-3 py-2">
<input class="mt-1 rounded-sm border-surface-variant text-primary focus:ring-primary h-4 w-4" id="terms" type="checkbox"/>
<label class="text-sm text-on-surface-variant leading-relaxed" for="terms">
                            Tôi đồng ý với <a class="text-primary font-bold hover:underline" href="#">Điều khoản dịch vụ</a> và <a class="text-primary font-bold hover:underline" href="#">Chính sách bảo mật</a> của Sportsync.
                        </label>
</div>

<a class="w-full kinetic-gradient text-on-primary-container font-extrabold text-lg py-4 rounded-xl shadow-[0_12px_32px_rgba(0,107,10,0.15)] hover:scale-[1.02] active:scale-95 transition-all text-center block" href="{{DATA:SCREEN:SCREEN_9}}">Tham gia ngay</a>

<!-- Divider -->
<!-- Social Logins -->

<p class="mt-10 text-center text-sm text-on-surface-variant font-medium mt-12">
                    Đã có tài khoản? <a class="text-primary font-bold hover:underline" href="{{DATA:SCREEN:SCREEN_9}}">Đăng nhập</a>
</p>
